apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/MytPraveen/proxmox-k8s.git
    targetRevision: main
    path: kubernetes/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
